packages:
  - libs/**
  - packages/**
  - recipes
  - docs
  - performance/act-performance
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  core-js: true
  esbuild: true
  simple-git-hooks: true
linkWorkspacePackages: true
onlyBuiltDependencies:
  - "@swc/core"
  - core-js
  - core-js-pure
  - esbuild
  - sharp
  - simple-git-hooks
