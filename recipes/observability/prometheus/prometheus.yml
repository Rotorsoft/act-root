# Scrape config for the act demo app. Prometheus runs in docker;
# host.docker.internal reaches the app on your host (Docker Desktop
# resolves it natively; the compose file adds the Linux host-gateway).
global:
  scrape_interval: 2s
scrape_configs:
  - job_name: act
    static_configs:
      - targets: ["host.docker.internal:4001"]
