name: CI-CD

permissions:
  contents: write
  pull-requests: write
  issues: write

on:
  pull_request:
    paths:
      - 'libs/**'
  push:
    branches: [master]
    paths:
      - 'libs/**'
  workflow_dispatch:

env:
  SKIP_SIMPLE_GIT_HOOKS: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5431:5432
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm typecheck
      - run: pnpm test

      # Render the v8 coverage summary as a markdown table in the PR/run
      # summary. `json-summary` reporter is enabled in vite.config.ts.
      - name: Coverage summary
        if: always()
        run: |
          node -e '
            const fs = require("fs");
            const f = "coverage/coverage-summary.json";
            if (!fs.existsSync(f)) { console.log("No coverage summary found"); process.exit(0); }
            const t = JSON.parse(fs.readFileSync(f, "utf8")).total;
            const row = (label, m) => `| ${label} | ${m.pct.toFixed(2)}% | ${m.covered}/${m.total} |`;
            const md = [
              "## Coverage",
              "",
              "| Metric | % | Covered / Total |",
              "|---|---:|---:|",
              row("Statements", t.statements),
              row("Branches",   t.branches),
              row("Functions",  t.functions),
              row("Lines",      t.lines),
              "",
            ].join("\n");
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + "\n");
          '

      # Perf regression guard. Compares a fresh bench run against the
      # checked-in baseline; fails if any scenario's p50 exceeds 1.5× baseline.
      # To refresh: `pnpm -F @rotorsoft/act bench:update` in a PR labeled
      # `perf-baseline-update` with rationale in PERFORMANCE.md.
      - run: pnpm -F @rotorsoft/act bench:run
      - run: pnpm -F @rotorsoft/act bench:check

      # Scenario benchmarks (Shape C). Each one has a built-in
      # regression assertion, so a real perf regression breaks the
      # build. The captured stdout ends up in the workflow's step
      # summary so reviewers see the numbers without scrolling logs.
      - name: bench:scenarios
        run: |
          set -o pipefail
          pnpm bench:scenarios 2>&1 | tee bench-scenarios.log
      - name: Append scenario bench results to step summary
        if: always()
        run: |
          {
            echo "## Scenario benchmark results"
            echo ""
            echo '```'
            # Extract the console.table blocks from the captured run.
            # Falls back to the full log if no tables are detected.
            if grep -q "===.*===" bench-scenarios.log 2>/dev/null; then
              awk '/^===/,/^└/' bench-scenarios.log
            else
              tail -n 80 bench-scenarios.log
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Coveralls upload is best-effort. Outages have blocked merges on
      # master before — we'd rather lose a coverage badge than lose a
      # release. `continue-on-error: true` lets the rest of the pipeline
      # advance regardless of coveralls availability.
      - uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Hand the built libs off to the CD matrix so each release job
      # doesn't have to rebuild the dependency tree from scratch.
      # `pnpm typecheck` runs `pnpm build` internally, so the dist files
      # already exist at this point.
      - if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: act-libs-dist
          path: libs/*/dist
          if-no-files-found: error
          retention-days: 1

  # Detect which libs actually changed in this push. Lets the CD matrix
  # skip release jobs for untouched libs (semantic-release is a no-op
  # in that case anyway, but skipping the whole job saves install +
  # checkout + node setup overhead — meaningful when most pushes only
  # touch one or two libs).
  changed-libs:
    if: github.ref == 'refs/heads/master'
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      libs: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            act-patch:   ['libs/act-patch/**']
            act:         ['libs/act/**']
            act-sse:     ['libs/act-sse/**']
            act-pg:      ['libs/act-pg/**']
            act-sqlite:  ['libs/act-sqlite/**']
            act-pino:    ['libs/act-pino/**']
            act-diagram: ['libs/act-diagram/**']

  cd:
    if: github.ref == 'refs/heads/master' && needs.changed-libs.outputs.libs != '[]'
    needs: [ci, changed-libs]
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1 # prevents concurrent pull/push conflicts on main branch
      fail-fast: false
      matrix:
        lib: ${{ fromJson(needs.changed-libs.outputs.libs) }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install

      # Restore the dist files built during CI — semantic-release
      # publishes whatever sits in `libs/<lib>/dist/`, so we don't need
      # to rebuild here. Default download path is the workspace root,
      # which matches the workspace-relative paths the artifact was
      # uploaded with (`libs/*/dist`).
      - uses: actions/download-artifact@v7
        with:
          name: act-libs-dist

      - name: configure git
        run: |
          git config user.name "rotorsoft"
          git config user.email "rotorsoft@outlook.com"

      - name: pull latest master
        run: git pull origin master --rebase

      - name: release ${{ matrix.lib }}
        working-directory: libs/${{ matrix.lib }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
