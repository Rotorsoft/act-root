name: Deploy Docusaurus Docs

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  filter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docs:
              - 'libs/act/src/**'
              - 'libs/act-patch/src/**'
              - 'libs/act-pg/src/**'
              - 'libs/act-sse/src/**'
              - 'docs/**'
    outputs:
      docs: ${{ steps.filter.outputs.docs }}

  deploy:
    needs: filter
    if: needs.filter.outputs.docs == 'true'
    runs-on: ubuntu-latest
    # Deploy straight from this workflow via actions/deploy-pages instead of
    # pushing a gh-pages branch for GitHub's internal (unretryable,
    # unconfigurable) pages-build-deployment workflow to pick up. The double
    # hop wedged twice on backend transients; this path has no second hop.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v7
        with:
          node-version: 22.23.1
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm -F docs build:all

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/build
      - uses: actions/deploy-pages@v5
        id: deployment
